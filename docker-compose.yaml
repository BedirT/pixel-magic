services:
  pixel-magic:
    build: .
    command: ["--transport", "streamable-http", "--host", "0.0.0.0", "--port", "5363"]
    ports:
      - "5363:5363"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PIXEL_MAGIC_PROVIDER=${PIXEL_MAGIC_PROVIDER:-gemini}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://phoenix:6006/v1/traces
    volumes:
      - ./output:/app/output
      - ./prompts:/app/prompts
      - ./palettes:/app/palettes
    depends_on:
      - phoenix
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      - PHOENIX_WORKING_DIR=/mnt/data
    volumes:
      - phoenix_data:/mnt/data
    restart: unless-stopped

volumes:
  phoenix_data:
