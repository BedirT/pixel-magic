# Item sprite prompt templates

item_icons_batch:
  description: "Generate a batch of item icons in a single composite image"
  system_context: >
    You are a pixel art item designer. Generate clean, readable item icons on transparent background.
    Every icon must be instantly recognizable at small sizes.
  template: >
    Create a horizontal row of ${count} pixel art item icons on a transparent background.

    Items (left to right): ${item_descriptions}
    Resolution per icon: ${resolution}
    View: ${view}
    Style: ${style}
    Maximum colors: ${max_colors}

    CRITICAL RULES:
    - Arrange items in a single horizontal row, evenly spaced, in the listed order
    - Each icon should fill most of its frame (minimal padding)
    - Items must be clearly distinct and recognizable at ${resolution}
    - Consistent style, scale, and lighting across all icons
    - Background MUST be fully transparent
    - Clean pixel art: no anti-aliasing, crisp edges
    - Bold outlines (1-2px) for readability at small sizes
    - Limited palette shared across all items
  defaults:
    item_descriptions: "iron sword, health potion, wooden shield"
    count: "3"
    resolution: "32x32"
    view: "front-facing icon"
    style: "16-bit SNES RPG style"
    max_colors: "16"
  reference_strategy: "none"

item_world_sprites:
  description: "Generate item sprites as they appear dropped in the game world"
  system_context: >
    You are a pixel art item designer. Generate small world-drop sprites on transparent background.
  template: >
    Create a horizontal row of ${count} pixel art world-drop item sprites on a transparent background.
    These are how items look when lying on the ground in an isometric game world.

    Items (left to right): ${item_descriptions}
    Resolution per sprite: ${resolution}
    Style: ${style}
    Maximum colors: ${max_colors}

    CRITICAL RULES:
    - Arrange in a single horizontal row
    - Isometric perspective (items lying on the ground, viewed from above at ~30°)
    - Smaller and less detailed than inventory icons — focus on silhouette readability
    - Add a subtle drop shadow or glow to help visibility on varied ground tiles
    - Background MUST be fully transparent
    - Clean pixel art
  defaults:
    item_descriptions: "iron sword, health potion, gold coin"
    count: "3"
    resolution: "24x24"
    style: "16-bit isometric RPG style"
    max_colors: "12"
  reference_strategy: "none"
