# UI element prompt templates

ui_elements_batch:
  description: "Generate multiple UI elements in a single composite image"
  system_context: >
    You are a pixel art UI designer. Generate clean, functional UI elements on transparent background.
    UI must be readable and match the game's pixel art aesthetic.
  template: >
    Create a horizontal row of ${count} pixel art UI elements on a transparent background.

    Elements (left to right): ${element_descriptions}
    Resolution per element: ${resolution}
    Style: ${style}
    Maximum colors: ${max_colors}

    CRITICAL RULES:
    - Arrange all elements in a single horizontal row, evenly spaced
    - Each element should be clearly distinct and functional-looking
    - Use consistent border/frame style across all elements
    - Rounded or beveled edges in pixel art style (1-2px borders)
    - Background MUST be fully transparent
    - Clean pixel art: no anti-aliasing, crisp edges
    - Text areas should be clearly defined (but don't render actual text)
    - Consistent color scheme across all UI elements
    - Elements should look like they belong in the same game UI
  defaults:
    element_descriptions: "health bar frame, mana bar frame, inventory slot"
    count: "3"
    resolution: "64x64"
    style: "16-bit RPG UI style"
    max_colors: "8"
  reference_strategy: "none"
