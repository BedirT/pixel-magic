# Effect animation prompt templates

effect_animation:
  description: "Generate all frames of an animated visual effect in a horizontal strip"
  system_context: >
    You are a pixel art VFX artist. Generate clean, vibrant effect animations on transparent background.
    Effects should read well at small sizes and feel dynamic.
  template: >
    Create a horizontal strip of ${frame_count} animation frames for a pixel art visual effect:
    ${effect_description}

    Frame count: ${frame_count} frames
    Resolution per frame: ${resolution}
    Style: ${style}
    Maximum colors: ${max_colors}
    Color emphasis: ${color_emphasis}

    CRITICAL RULES:
    - Arrange ALL frames in a single horizontal row, left to right, in animation order
    - Frame 1: effect begins / appears
    - Middle frames: effect at full intensity
    - Final frame: effect dissipating / fading
    - Background MUST be fully transparent (the effect floats in space)
    - Clean pixel art: sharp edges, limited palette, vibrant colors
    - Each frame should be the same size
    - Use the emphasized colors prominently: ${color_emphasis}
    - Add subtle pixel particles or energy wisps for dynamism
  defaults:
    effect_description: "magical spell explosion"
    frame_count: "6"
    resolution: "64x64"
    style: "16-bit pixel art"
    max_colors: "12"
    color_emphasis: ""
  reference_strategy: "none"
