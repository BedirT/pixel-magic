name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Run test suite
        run: uv run pytest -q
      - name: Check MCP docs coverage
        run: uv run python scripts/check_mcp_docs_coverage.py

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install docs dependencies
        run: npm install --prefix website
      - name: Build docs (includes link checks)
        run: npm run build --prefix website
